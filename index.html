<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Basketball Scoreboard</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <div class="scoreboard">
    <h1>Basketball Scoreboard</h1>

    <div class="teams">

      <div class="team">
        <h2>Home</h2>
        <p id="scoreA">0</p>
        <div class="buttons">
          <button onclick="addPoints('A', 1)">+1</button>
          <button onclick="addPoints('A', 2)">+2</button>
          <button onclick="addPoints('A', 3)">+3</button>
        </div>
      </div>

      <div class="team">
        <h2>Opps</h2>
        <p id="scoreB">0</p>
        <div class="buttons">
          <button onclick="addPoints('B', 1)">+1</button>
          <button onclick="addPoints('B', 2)">+2</button>
          <button onclick="addPoints('B', 3)">+3</button>
        </div>
      </div>

    </div>

    <button class="reset" onclick="resetScores()">Reset</button>

  </div>

  <script src="index.js"></script>
</body>
</html>
